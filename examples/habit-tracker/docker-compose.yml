version: "3.9"

services:
  app:
    image: habit-tracker:${APP_VERSION:-latest}
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    container_name: habit-tracker-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
    env_file:
      - .env.production
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - habit-net

  nginx:
    image: nginx:1.25-alpine
    container_name: habit-tracker-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      app:
        condition: service_healthy
    networks:
      - habit-net

networks:
  habit-net:
    driver: bridge
